name: docs-automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  issues:
    types: [opened, edited, reopened, labeled]

permissions:
  contents: read
  issues: read

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install docs dependencies
        run: bun install

      - name: Checkout upstream epusdt repo
        uses: actions/checkout@v4
        with:
          repository: GMWalletApp/epusdt
          path: .upstream/epusdt
          token: ${{ secrets.DOCS_AUTOMATION_TOKEN }}

      - name: Collect automation context
        env:
          DOCS_AUTOMATION_TOKEN: ${{ secrets.DOCS_AUTOMATION_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/docs-automation-context.mjs

      - name: Show collected context summary
        run: cat .automation/context.json

      - name: Send webhook to OpenClaw bridge
        env:
          OPENCLAW_WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          OPENCLAW_WEBHOOK_SECRET: ${{ secrets.OPENCLAW_WEBHOOK_SECRET }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_ACTION: ${{ github.event.action || '' }}
        run: node scripts/docs-automation-webhook.mjs
